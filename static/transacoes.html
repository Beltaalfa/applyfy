<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c9a227">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Transações | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0b; --bg-card: #121214; --border: #1e1e22; --text: #e4e4e7; --text-muted: #71717a; --accent: #c9a227; --radius: 8px; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 1rem; padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); padding-bottom: max(2rem, env(safe-area-inset-bottom)); }
    @media (max-width: 640px) { .wrap { padding: 0.75rem; } h1 { font-size: 1.25rem; } .filtro select, .filtro input { min-width: 100%; min-height: 44px; } th, td { padding: 0.5rem; font-size: 0.75rem; } }
    h1 { font-size: 1.5rem; margin: 0 0 1rem 0; }
    .nav { margin-bottom: 1.5rem; }
    .nav a { color: var(--accent); text-decoration: none; margin-right: 1rem; padding: 0.5rem 0; min-height: 44px; display: inline-flex; align-items: center; }
    .nav a:hover { text-decoration: underline; }
    .filtro { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .filtro label { color: var(--text-muted); }
    .filtro input, .filtro select { padding: 0.5rem 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 1rem; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    th.num { text-align: right; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .empty { padding: 3rem; text-align: center; color: var(--text-muted); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 1rem; }
    .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); max-width: 520px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { margin: 0; font-size: 1.1rem; color: var(--text); }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.5rem; line-height: 1; padding: 0.25rem; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 1rem 1.25rem; overflow-y: auto; flex: 1; }
    .modal-summary { margin-bottom: 1rem; font-size: 0.95rem; color: var(--text); }
    .modal-summary.success { color: #86efac; }
    .modal-summary.has-errors { color: #fbbf24; }
    .modal-errors { list-style: none; margin: 0; padding: 0; font-size: 0.85rem; }
    .modal-errors li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); color: var(--text-muted); word-break: break-all; }
    .modal-errors li:last-child { border-bottom: none; }
    .modal-errors code { font-size: 0.8em; color: var(--accent); margin-right: 0.5rem; }
    .modal-footer { padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); text-align: right; }
    .modal-footer .btn { padding: 0.5rem 1rem; border-radius: var(--radius); border: 1px solid var(--accent); background: var(--accent); color: #0a0a0b; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav"><a href="/">← Painel</a> <a href="/historico">Histórico</a> <a href="/evolucao">Evolução</a> <a href="/transacoes">Transações</a> <a href="/meta">Meta</a> <a href="/produtores">Produtores</a> <a href="/financeiro">Financeiro</a> <a href="/log">Log</a></nav>
    <h1>Transações (webhook)</h1>
    <div class="filtro">
      <label for="dateFrom">De:</label>
      <input type="date" id="dateFrom">
      <label for="dateTo">Até:</label>
      <input type="date" id="dateTo">
      <label for="event">Evento:</label>
      <select id="event">
        <option value="">Todos</option>
        <option value="TRANSACTION_CREATED">TRANSACTION_CREATED</option>
        <option value="TRANSACTION_PAID">TRANSACTION_PAID</option>
        <option value="TRANSACTION_CANCELED">TRANSACTION_CANCELED</option>
        <option value="TRANSACTION_REFUNDED">TRANSACTION_REFUNDED</option>
        <option value="PRODUCER_CREATED">PRODUCER_CREATED</option>
      </select>
      <label for="offerCode">Offer code:</label>
      <input type="text" id="offerCode" placeholder="Filtrar por offer code">
      <button type="button" id="btnFiltro" style="padding:0.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--accent);color:#0a0a0b;cursor:pointer;font-weight:600;">Buscar</button>
      <button type="button" id="btnSyncOffer" style="padding:0.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;" title="Busca na API ApplyFy o offer code de cada produtor (PRODUCER_CREATED) e preenche ID/Nome do produtor nas transações.">Sincronizar produtores</button>
    </div>
    <p id="msgSync" style="margin:0 0 0.5rem 0;font-size:0.9rem;color:var(--text-muted);"></p>
    <p class="empty" id="msgTransacoes" style="margin-bottom:1rem;"></p>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead id="thead">
            <tr><th>Carregando…</th></tr>
          </thead>
          <tbody id="tbody"><tr><td class="empty">Configure o webhook e busque aqui.</td></tr></tbody>
        </table>
      </div>
    </div>
    <div id="modalSyncResult" class="modal-overlay" style="display: none;" aria-hidden="true">
      <div class="modal-box" role="dialog" aria-labelledby="modalSyncTitle">
        <div class="modal-header">
          <h2 id="modalSyncTitle">Resultado da sincronização</h2>
          <button type="button" class="modal-close" id="modalSyncClose" aria-label="Fechar">&times;</button>
        </div>
        <div class="modal-body">
          <p id="modalSyncSummary" class="modal-summary"></p>
          <ul id="modalSyncErrors" class="modal-errors"></ul>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" id="modalSyncOk">OK</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    function buildUrl() {
      var from = document.getElementById('dateFrom').value;
      var to = document.getElementById('dateTo').value;
      var event = document.getElementById('event').value;
      var offer = document.getElementById('offerCode').value.trim();
      var params = new URLSearchParams();
      if (from) params.set('date_from', from);
      if (to) params.set('date_to', to);
      if (event) params.set('event', event);
      if (offer) params.set('offer_code', offer);
      params.set('limit', '500');
      return '/api/transacoes?' + params.toString();
    }
    var columnLabels = {
      received_at: 'Data',
      event: 'Evento',
      token: 'Token',
      offer_code: 'Offer code',
      producer_id: 'ID produtor',
      producer_name: 'Produtor',
      producer_email: 'Email produtor',
      producer_phone: 'Tel. produtor',
      producer_document: 'Doc. produtor',
      producer_status: 'Status produtor',
      producer_created_at: 'Produtor criado em',
      transaction_id: 'ID transação',
      transaction_status: 'Status transação',
      payment_method: 'Método pagamento',
      original_currency: 'Moeda origem',
      original_amount: 'Valor origem',
      currency: 'Moeda',
      amount: 'Valor',
      exchange_rate: 'Câmbio',
      installments: 'Parcelas',
      transaction_create_at: 'Transação criada em',
      transaction_payed_at: 'Transação paga em',
      pix_end_to_end_id: 'PIX endToEndId',
      client_id: 'ID cliente',
      client_name: 'Cliente nome',
      client_email: 'Cliente email',
      client_phone: 'Cliente tel',
      client_cpf: 'CPF',
      client_cnpj: 'CNPJ',
      client_address: 'Endereço cliente',
      subscription_id: 'ID assinatura',
      order_items_summary: 'Itens (resumo)',
      utm_source: 'UTM source',
      utm_medium: 'UTM medium',
      utm_campaign: 'UTM campaign',
      utm_content: 'UTM content',
      utm_term: 'UTM term',
      track_ip: 'IP',
      track_country: 'País',
      track_user_agent: 'User-Agent',
      track_zip_code: 'CEP',
      track_city: 'Cidade',
      track_state: 'Estado'
    };
    function fmtDateLocal(val) {
      if (val == null || val === '') return '–';
      var s = String(val).trim().replace(' ', 'T');
      if (!s) return '–';
      if (s.length >= 19 && s[s.length - 1] !== 'Z' && !/[+-]\d{2}:?\d{2}$/.test(s)) s += 'Z';
      var d = new Date(s);
      if (isNaN(d.getTime())) return String(val);
      return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'medium', hour12: false });
    }
    function fmtVal(val, key) {
      if (val == null || val === '') return '–';
      if (key === 'amount' || key === 'original_amount') return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(val));
      if (key === 'received_at' || key === 'transaction_create_at' || key === 'transaction_payed_at' || key === 'producer_created_at') return fmtDateLocal(val);
      if (key === 'payment_method') return String(val).replace(/_/g, ' ');
      return String(val);
    }
    function loadTransacoes() {
      var msg = document.getElementById('msgTransacoes');
      msg.textContent = 'Carregando…';
      fetch(buildUrl()).then(function(r) { return r.json(); }).then(function(data) {
        msg.textContent = data.total !== undefined ? 'Total: ' + data.total + ' transações' : '';
        var list = data.transacoes || [];
        var columns = data.columns && data.columns.length ? data.columns : Object.keys(columnLabels);
        var thead = document.getElementById('thead');
        var tbody = document.getElementById('tbody');
        var colCount = columns.length;
        thead.innerHTML = '<tr>' + columns.map(function(col) {
          var label = columnLabels[col] || col;
          var cls = (col === 'amount' || col === 'original_amount') ? ' class="num"' : '';
          return '<th' + cls + '>' + label + '</th>';
        }).join('') + '</tr>';
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="' + colCount + '" class="empty">Nenhuma transação encontrada. Configure o webhook no painel ApplyFy (URL: ' + location.origin + '/api/webhooks/applyfy).</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(function(t) {
          return '<tr>' + columns.map(function(col) {
            var val = fmtVal(t[col], col);
            var cls = (col === 'amount' || col === 'original_amount') ? ' class="num"' : '';
            return '<td' + cls + ' title="' + (val !== '–' ? String(val).replace(/&/g,'&amp;').replace(/"/g, '&quot;').replace(/</g,'&lt;') : '') + '">' + (val.length > 100 ? val.slice(0, 100) + '…' : val) + '</td>';
          }).join('') + '</tr>';
        }).join('');
      }).catch(function(e) {
        document.getElementById('msgTransacoes').textContent = 'Erro: ' + (e.message || 'falha ao carregar');
        document.getElementById('tbody').innerHTML = '<tr><td class="empty">Erro ao carregar transações.</td></tr>';
      });
    }
    document.getElementById('btnFiltro').addEventListener('click', loadTransacoes);
    document.getElementById('btnSyncOffer').addEventListener('click', function() {
      var msg = document.getElementById('msgSync');
      msg.textContent = 'Sincronizando…';
      msg.style.color = '';
      fetch('/api/transacoes/sync-offer-producers').then(function(r) { return r.json(); }).then(function(data) {
        if (data.error) {
          msg.textContent = 'Erro: ' + data.error;
          msg.style.color = '#f87171';
          return;
        }
        var saved = data.saved_mappings || 0;
        var errors = data.errors || [];
        msg.textContent = saved > 0 ? 'Mapeamentos salvos: ' + saved + (errors.length ? '. Houve erros — veja o resultado abaixo.' : '.') : (errors.length ? 'Nenhum mapeamento salvo. Veja os erros abaixo.' : 'Concluído.');
        if (errors.length) msg.style.color = '#fbbf24';

        var modal = document.getElementById('modalSyncResult');
        var summaryEl = document.getElementById('modalSyncSummary');
        var listEl = document.getElementById('modalSyncErrors');
        summaryEl.textContent = 'Mapeamentos salvos: ' + saved + (errors.length ? '. Erros: ' + errors.length + '.' : '.');
        summaryEl.className = 'modal-summary' + (errors.length ? ' has-errors' : ' success');
        listEl.innerHTML = '';
        if (errors.length) {
          errors.forEach(function(e) {
            var li = document.createElement('li');
            var id = (e.producer_id || '').toString().replace(/</g, '&lt;').replace(/"/g, '&quot;');
            var err = (e.error || '').toString().replace(/</g, '&lt;').replace(/"/g, '&quot;');
            li.innerHTML = '<code>' + id + '</code> ' + err;
            listEl.appendChild(li);
          });
        }
        modal.style.display = 'flex';
        modal.setAttribute('aria-hidden', 'false');
        loadTransacoes();
      }).catch(function(e) {
        msg.textContent = 'Erro: ' + (e.message || 'falha');
        msg.style.color = '#f87171';
      });
    });
    function closeSyncModal() {
      var modal = document.getElementById('modalSyncResult');
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
    }
    document.getElementById('modalSyncClose').addEventListener('click', closeSyncModal);
    document.getElementById('modalSyncOk').addEventListener('click', closeSyncModal);
    document.getElementById('modalSyncResult').addEventListener('click', function(e) {
      if (e.target === this) closeSyncModal();
    });
    loadTransacoes();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
  </script>
</body>
</html>
