<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c9a227">
  <title>Meta | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-card: #121214;
      --border: #1e1e22;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #c9a227;
      --accent-hover: #d4af37;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      padding-left: max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
    }
    @media (max-width: 640px) {
      .wrap { padding: 0.75rem; }
      header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      h1 { font-size: 1.25rem; }
      .actions { width: 100%; }
      .btn { min-height: 44px; flex: 1 1 auto; justify-content: center; }
      th, td { padding: 0.5rem 0.5rem; font-size: 0.75rem; }
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }
    .last-run {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #0a0a0b;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #1a1a1d;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--accent); }
    th .sort-icon { opacity: 0.5; margin-left: 0.25rem; }
    th.sorted .sort-icon { opacity: 1; color: var(--accent); }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .empty {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-muted);
    }
    select.tag-select {
      width: 100%;
      min-width: 120px;
      padding: 0.4rem 0.5rem;
      font-family: inherit;
      font-size: 0.8125rem;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }
    select.tag-select:hover { border-color: var(--accent); }
    .pct-ok { color: #22c55e; }
    .pct-warn { color: #eab308; }
    .pct-low { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Meta</h1>
        <p class="last-run" id="lastRun">Carregando…</p>
      </div>
      <div class="actions">
        <a href="/" class="btn btn-secondary">← Painel de saldos</a>
        <a href="/historico" class="btn btn-secondary">Histórico</a>
        <a href="/evolucao" class="btn btn-secondary">Evolução</a>
        <a href="/transacoes" class="btn btn-secondary">Transações</a>
        <a href="/produtores" class="btn btn-secondary">Produtores</a>
        <a href="/financeiro" class="btn btn-secondary">Financeiro</a>
        <a href="/log" class="btn btn-secondary">Log</a>
        <a href="/api/exportar?formato=xlsx" class="btn btn-primary" download>Exportar XLSX</a>
        <a href="/api/exportar?formato=csv" class="btn btn-secondary" download>Exportar CSV</a>
      </div>
    </header>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="Nome" data-type="text">Nome <span class="sort-icon">↕</span></th>
              <th data-col="Email" data-type="text">Email <span class="sort-icon">↕</span></th>
              <th data-col="tag" data-type="text">Tag (status) <span class="sort-icon">↕</span></th>
              <th data-col="Vendas líquidas" data-type="num" class="num">Vendas líquidas <span class="sort-icon">↕</span></th>
              <th class="num">Meta</th>
              <th data-col="_pct" data-type="num" class="num">% meta <span class="sort-icon">↕</span></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="empty">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    var dadosAtuais = [];
    var sortCol = null;
    var sortAsc = true;
    var META_VALOR = 10000;
    var TAG_OPCOES = ['', 'Ativo', 'Inativo', 'Novo', 'Em follow-up', 'Top', 'Fora'];
    var STORAGE_KEY = 'applyfy_meta_tags';

    function fmtMoney(v) {
      if (v == null || v === '' || isNaN(Number(v))) return '–';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v));
    }
    function getTags() {
      try {
        var s = localStorage.getItem(STORAGE_KEY);
        return s ? JSON.parse(s) : {};
      } catch (e) { return {}; }
    }
    function getTag(email) {
      return (getTags()[String(email).trim()] || '').trim();
    }
    function setTag(email, tag) {
      var o = getTags();
      email = String(email).trim();
      if (tag) o[email] = tag; else delete o[email];
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(o)); } catch (e) {}
    }
    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function tagSelectHtml(email, currentTag) {
      var opts = TAG_OPCOES.map(function(opt) {
        var label = opt || '–';
        var sel = (currentTag === opt) ? ' selected' : '';
        return '<option value="' + esc(opt) + '"' + sel + '>' + esc(label) + '</option>';
      }).join('');
      return '<select class="tag-select" data-email="' + esc(email) + '" title="Status do produtor">' + opts + '</select>';
    }
    function pctClass(pct) {
      if (pct >= 100) return 'pct-ok';
      if (pct >= 50) return 'pct-warn';
      return 'pct-low';
    }
    function rowToHtml(row) {
      var vl = Number(row['Vendas líquidas']) || 0;
      var pct = META_VALOR > 0 ? (vl / META_VALOR) * 100 : 0;
      row._pct = pct;
      row.tag = row.tag !== undefined ? row.tag : getTag(row.Email);
      var pctStr = pct >= 100 ? '100%+' : (pct.toFixed(1).replace('.', ',') + '%');
      return '<tr>' +
        '<td>' + esc(row.Nome || '–') + '</td>' +
        '<td>' + esc(row.Email || '–') + '</td>' +
        '<td>' + tagSelectHtml(row.Email, row.tag) + '</td>' +
        '<td class="num">' + fmtMoney(row['Vendas líquidas']) + '</td>' +
        '<td class="num">' + fmtMoney(META_VALOR) + '</td>' +
        '<td class="num ' + pctClass(pct) + '">' + pctStr + '</td>' +
      '</tr>';
    }
    function renderTable(rows) {
      var tbody = document.getElementById('tbody');
      tbody.innerHTML = rows.length ? rows.map(rowToHtml).join('') : '<tr><td colspan="6" class="empty">Nenhum dado.</td></tr>';
    }
    function render(data) {
      var lastRun = document.getElementById('lastRun');
      if (!data.resultados || data.resultados.length === 0) {
        dadosAtuais = [];
        renderTable([]);
        lastRun.textContent = data.run_at ? 'Última atualização: ' + new Date(data.run_at).toLocaleString('pt-BR') : 'Nenhuma exportação ainda.';
        return;
      }
      dadosAtuais = data.resultados.map(function(r) {
        r.tag = getTag(r.Email);
        var vl = Number(r['Vendas líquidas']) || 0;
        r._pct = META_VALOR > 0 ? (vl / META_VALOR) * 100 : 0;
        return r;
      });
      lastRun.textContent = 'Última atualização: ' + (data.run_at ? new Date(data.run_at).toLocaleString('pt-BR') : '–') + ' · ' + data.total + ' produtores · Meta: R$ 10.000';
      sortCol = null;
      sortAsc = true;
      document.querySelectorAll('th').forEach(function(th){ th.classList.remove('sorted'); });
      renderTable(dadosAtuais);
    }
    function sortData(col, type) {
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = true; }
      var mult = sortAsc ? 1 : -1;
      var sorted = dadosAtuais.slice().sort(function(a, b) {
        var va = col === 'tag' ? (a.tag || '') : (a[col] !== undefined ? a[col] : a[col]);
        var vb = col === 'tag' ? (b.tag || '') : (b[col] !== undefined ? b[col] : b[col]);
        if (type === 'num' || col === '_pct') {
          va = Number(va) || 0;
          vb = Number(vb) || 0;
          return mult * (va - vb);
        }
        va = (va || '').toString().toLowerCase();
        vb = (vb || '').toString().toLowerCase();
        return mult * va.localeCompare(vb);
      });
      document.querySelectorAll('th').forEach(function(th){
        th.classList.toggle('sorted', th.getAttribute('data-col') === col);
        var icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = th.getAttribute('data-col') === col ? (sortAsc ? '↑' : '↓') : '↕';
      });
      renderTable(sorted);
    }
    document.querySelector('thead').addEventListener('click', function(e) {
      var th = e.target.closest('th[data-col]');
      if (th) sortData(th.getAttribute('data-col'), th.getAttribute('data-type') || 'text');
    });
    document.getElementById('tbody').addEventListener('change', function(e) {
      var sel = e.target.closest('select.tag-select');
      if (!sel) return;
      var email = sel.getAttribute('data-email');
      var tag = (sel.value || '').trim();
      setTag(email, tag);
      for (var i = 0; i < dadosAtuais.length; i++) {
        if (String(dadosAtuais[i].Email).trim() === email) { dadosAtuais[i].tag = tag; break; }
      }
    });
    fetch('/api/ultimo-relatorio')
      .then(function(r) { return r.json(); })
      .then(render)
      .catch(function() {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">Erro ao carregar dados.</td></tr>';
        document.getElementById('lastRun').textContent = 'Erro ao carregar.';
      });
  </script>
</body>
</html>
