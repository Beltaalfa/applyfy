<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Fluxo de caixa, DRE e DFC | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/painel-theme.css">
</head>
<body data-active="/financeiro">
  <div class="app-shell" id="app-shell">
    <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menu">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button type="button" class="sidebar-overlay" id="sidebar-overlay" hidden aria-label="Fechar menu"></button>
    <aside class="sidebar" id="painel-sidebar" aria-label="Navegação"></aside>
    <div class="main-column">
      <header class="top-bar">
        <div class="top-bar-inner">
          <h1 class="page-title">Fluxo de caixa, DRE e DFC</h1>
        </div>
      </header>
      <main class="main-content">
        <div class="tabs">
          <button type="button" data-tab="categorias">Categorias</button>
          <button type="button" data-tab="lancamentos">Lançamentos</button>
          <button type="button" data-tab="relatorios">Relatórios</button>
        </div>
        <div id="panel-categorias" class="tab-panel">
          <div class="form-inline" id="formCategoria">
            <input type="text" id="catNome" placeholder="Nome da categoria" required>
            <select id="catTipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
            <button type="button" class="btn btn-primary" id="btnSalvarCategoria">Salvar</button>
            <button type="button" class="btn btn-secondary" id="btnCancelarCategoria" style="display:none;">Cancelar</button>
            <input type="hidden" id="catId">
          </div>
          <div class="card"><div class="table-wrap flat"><table><thead><tr><th>Nome</th><th>Tipo</th><th>Ativa</th><th>Ações</th></tr></thead><tbody id="tbodyCategorias"></tbody></table></div></div>
        </div>
        <div id="panel-lancamentos" class="tab-panel">
          <div class="filtro">
            <label>De</label><input type="date" id="lancDateFrom">
            <label>Até</label><input type="date" id="lancDateTo">
            <label>Mês</label><input type="number" id="lancMes" min="1" max="12" placeholder="Mês">
            <label>Ano</label><input type="number" id="lancAno" min="2020" max="2030" placeholder="Ano">
            <label>Tipo</label><select id="lancTipo"><option value="">Todos</option><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
            <label>Categoria</label><select id="lancCategoria"><option value="">Todas</option></select>
            <button type="button" class="btn btn-primary" id="btnFiltroLanc">Buscar</button>
            <button type="button" class="btn btn-secondary" id="btnNovoLanc">Novo lançamento</button>
          </div>
          <div class="form-inline" id="formLancamento" style="display:none;">
            <input type="date" id="lancData" required>
            <input type="number" id="lancValor" step="0.01" min="0" placeholder="Valor" required>
            <select id="lancTipoForm"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
            <select id="lancCategoriaForm"><option value="">Categoria</option></select>
            <input type="text" id="lancDescricao" placeholder="Descrição">
            <button type="button" class="btn btn-primary" id="btnSalvarLanc">Salvar</button>
            <button type="button" class="btn btn-secondary" id="btnCancelarLanc">Cancelar</button>
            <input type="hidden" id="lancId">
          </div>
          <div class="card"><div class="table-wrap flat"><table><thead><tr><th>Data</th><th class="num">Valor</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Ações</th></tr></thead><tbody id="tbodyLancamentos"><tr><td colspan="6" class="empty">Use os filtros e clique em Buscar.</td></tr></tbody></table></div></div>
        </div>
        <div id="panel-relatorios" class="tab-panel">
          <div class="filtro">
            <label>De</label><input type="date" id="relDateFrom">
            <label>Até</label><input type="date" id="relDateTo">
            <label>Mês</label><input type="number" id="relMes" min="1" max="12">
            <label>Ano</label><input type="number" id="relAno" min="2020" max="2030">
            <button type="button" class="btn btn-primary" id="btnRelatorio">Atualizar relatórios</button>
          </div>
          <div class="relatorio-block"><h3>Fluxo de Caixa</h3><div class="card"><div class="table-wrap flat"><table><thead><tr><th>Data</th><th class="num">Receitas</th><th class="num">Despesas</th><th class="num">Saldo</th></tr></thead><tbody id="tbodyFluxo"><tr><td colspan="4" class="empty">Defina o período e clique em Atualizar.</td></tr></tbody></table></div><p id="resumoFluxo" class="text-muted" style="padding:1rem;margin:0;"></p></div></div>
          <div class="relatorio-block"><h3>DRE</h3><div class="card"><div class="table-wrap flat"><table><thead><tr><th>Receitas por categoria</th><th class="num">Valor</th></tr></thead><tbody id="tbodyDreReceitas"></tbody></table></div><div class="table-wrap flat" style="margin-top:0.5rem;"><table><thead><tr><th>Despesas por categoria</th><th class="num">Valor</th></tr></thead><tbody id="tbodyDreDespesas"></tbody></table></div><p id="resumoDre" class="text-muted" style="padding:1rem;margin:0;"></p></div></div>
          <div class="relatorio-block"><h3>DFC</h3><div class="card"><div class="table-wrap flat"><table><thead><tr><th>Natureza</th><th class="num">Entradas</th><th class="num">Saídas</th><th class="num">Saldo</th></tr></thead><tbody id="tbodyDfc"></tbody></table></div></div></div>
        </div>
      </main>
    </div>
  </div>
  <script src="/painel-shell.js" defer></script>
  <script src="/static/financeiro.js"></script>
</body>
</html>
