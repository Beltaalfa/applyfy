<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Produtores (webhook) | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/painel-theme.css">
</head>
<body data-active="/produtores">
  <div class="app-shell" id="app-shell">
    <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menu">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button type="button" class="sidebar-overlay" id="sidebar-overlay" hidden aria-label="Fechar menu"></button>
    <aside class="sidebar" id="painel-sidebar" aria-label="Navegação"></aside>
    <div class="main-column">
      <header class="top-bar">
        <div class="top-bar-inner">
          <h1 class="page-title">Produtores (webhook)</h1>
        </div>
      </header>
      <main class="main-content">
        <p id="msgTotal" class="empty" style="margin-top:0;">Lista de produtores que chegaram pelo webhook (PRODUCER_CREATED) ou pelo mapeamento offer code → produtor. Use <strong>Buscar na API</strong> para carregar os dados completos da ApplyFy (requer mesma conta do webhook).</p>
        <div class="card">
          <div class="table-wrap flat">
            <table>
              <thead>
                <tr>
                  <th>ID produtor</th>
                  <th>Nome</th>
                  <th>Offer codes</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tbody"><tr><td colspan="4" class="empty">Carregando…</td></tr></tbody>
            </table>
          </div>
        </div>
        <div id="apiResultBox" style="display:none;">
          <h3 class="content-h2" style="margin-top:1.5rem;">Resposta da API ApplyFy</h3>
          <pre id="apiResult" class="api-result"></pre>
        </div>
      </main>
    </div>
  </div>
  <script src="/static/painel-shell.js" defer></script>
  <script>
    function loadProdutores() {
      var tbody = document.getElementById('tbody');
      tbody.innerHTML = '<tr><td colspan="4" class="empty">Carregando…</td></tr>';
      fetch('/api/produtores-webhook?limit=500').then(function(r) { return r.json(); }).then(function(data) {
        var list = data.produtores || [];
        document.getElementById('msgTotal').textContent = 'Total: ' + (data.total || list.length) + ' produtores. Clique em "Buscar na API" para ver os dados completos (nome, email, taxas, etc.) da ApplyFy. Se aparecer 403, webhook e API precisam usar a mesma conta ApplyFy.';
        document.getElementById('msgTotal').classList.remove('empty');
        document.getElementById('msgTotal').classList.add('text-muted');
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">Nenhum produtor ainda. Rode a exportação de saldos (cron/run_daily) com sucesso ou configure o webhook ApplyFy para receber PRODUCER_CREATED. Os produtores do histórico de exportação também aparecem aqui.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(function(p) {
          var id = (p.producer_id || '').replace(/</g, '&lt;').replace(/"/g, '&quot;');
          var name = (p.producer_name || '–').replace(/</g, '&lt;').replace(/"/g, '&quot;');
          var codes = (p.offer_codes || []).length ? p.offer_codes.join(', ') : '–';
          var isEmail = id.indexOf('@') !== -1;
          var btn = isEmail
            ? '<span class="text-muted" title="Produtor do histórico de exportação; Buscar na API usa ID numérico">–</span>'
            : '<button type="button" class="btn-api" data-id="' + id + '">Buscar na API</button>';
          return '<tr><td><code>' + id + '</code></td><td>' + name + '</td><td>' + codes + '</td><td>' + btn + '</td></tr>';
        }).join('');
        tbody.querySelectorAll('.btn-api').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var id = this.getAttribute('data-id');
            if (!id) return;
            var box = document.getElementById('apiResultBox');
            var pre = document.getElementById('apiResult');
            this.classList.add('loading');
            this.textContent = 'Buscando…';
            fetch('/api/produtor/' + encodeURIComponent(id) + '/detalhes').then(function(r) {
              return r.text().then(function(text) {
                var json = null;
                try { json = text ? JSON.parse(text) : {}; } catch (e) { json = null; }
                return { ok: r.ok, json: json, text: text };
              });
            }).then(function(o) {
              var pre = document.getElementById('apiResult');
              if (o.json === null) {
                pre.textContent = 'O servidor retornou uma página em vez de JSON (possível 404 ou 502).\n\n• 502 Bad Gateway: o proxy (Cloudflare/servidor) não recebeu resposta a tempo do backend. Reinicie o serviço da aplicação (gunicorn/uwsgi) e confira os logs. Se a API ApplyFy estiver lenta, o timeout foi reduzido para 10s (APPLYFY_API_TIMEOUT no .env).\n\n• 404: a rota /api/produtor/ID/detalhes pode não existir neste ambiente — faça o deploy e reinicie o servidor.\n\nResposta (início):\n' + (o.text || '').slice(0, 600);
                pre.classList.add('error');
              } else {
                pre.textContent = JSON.stringify(o.json, null, 2);
                if (!o.ok || o.json.error) { pre.classList.add('error'); } else { pre.classList.remove('error'); }
              }
              box.style.display = 'block';
              pre.scrollIntoView({ behavior: 'smooth' });
            }).catch(function(e) {
              pre.textContent = 'Erro: ' + (e.message || 'falha ao buscar');
              pre.classList.add('error');
              box.style.display = 'block';
            }).finally(function() {
              btn.classList.remove('loading');
              btn.textContent = 'Buscar na API';
            });
          });
        });
      }).catch(function(e) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="4" class="empty">Erro: ' + (e.message || 'falha ao carregar') + '</td></tr>';
      });
    }
    loadProdutores();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
  </script>
</body>
</html>
