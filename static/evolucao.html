<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c9a227">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Evolução por produtor | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    :root { --bg: #0a0a0b; --bg-card: #121214; --border: #1e1e22; --text: #e4e4e7; --text-muted: #71717a; --accent: #c9a227; --radius: 8px; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0b; color: #e4e4e7; min-height: 100vh; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 1rem; padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); padding-bottom: max(2rem, env(safe-area-inset-bottom)); }
    @media (max-width: 640px) { .wrap { padding: 0.75rem; } h1 { font-size: 1.25rem; } .filtro input, .filtro select { min-width: 100%; min-height: 44px; } .chart-container { height: 280px; } }
    h1 { font-size: 1.5rem; margin: 0 0 1rem 0; }
    .nav { margin-bottom: 1.5rem; }
    .nav a { color: var(--accent); text-decoration: none; margin-right: 1rem; padding: 0.5rem 0; min-height: 44px; display: inline-flex; align-items: center; }
    .nav a:hover { text-decoration: underline; }
    .filtro { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .filtro-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .filtro label { color: var(--text-muted); }
    .filtro input[type="text"], .filtro select { padding: 0.5rem 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 1rem; }
    .filtro input[type="text"] { min-width: 260px; }
    .filtro select { min-width: 280px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1rem; color: var(--text-muted); margin: 0 0 1rem 0; }
    .empty { padding: 3rem; text-align: center; color: var(--text-muted); }
    .chart-container { position: relative; height: 360px; }
    .text-muted { color: var(--text-muted); font-size: 0.95rem; }
    code { background: var(--bg); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.85em; }
    .btn { padding: 0.5rem 1rem; border-radius: var(--radius); border: 1px solid var(--accent); background: var(--accent); color: var(--bg); font-family: inherit; font-size: 1rem; cursor: pointer; min-height: 44px; }
    .btn:hover { opacity: 0.9; }
    #producerId { min-width: 200px; }
</head>
<body style="background:#0a0a0b;color:#e4e4e7;margin:0;min-height:100vh;">
  <div style="background:#c9a227;color:#0a0a0b;padding:8px 1rem;font-weight:600;text-align:center;">Evolução por produtor — ApplyFy</div>
  <div class="wrap" style="max-width:1200px;margin:0 auto;padding:1rem;">
    <nav class="nav" style="margin-bottom:1.5rem;"><a href="/" style="color:#c9a227;text-decoration:none;">← Painel</a> <a href="/historico" style="color:#c9a227;text-decoration:none;">Histórico por data</a> <a href="/evolucao" style="color:#c9a227;text-decoration:none;">Evolução</a> <a href="/transacoes" style="color:#c9a227;text-decoration:none;">Transações</a> <a href="/meta" style="color:#c9a227;text-decoration:none;">Meta</a> <a href="/produtores" style="color:#c9a227;text-decoration:none;">Produtores</a> <a href="/financeiro" style="color:#c9a227;text-decoration:none;">Financeiro</a> <a href="/log" style="color:#c9a227;text-decoration:none;">Log</a></nav>
    <h1 style="font-size:1.5rem;margin:0 0 1rem 0;">Evolução dos saldos por produtor</h1>
    <p class="text-muted" style="margin:0 0 1rem 0;">Os dados de evolução vêm do histórico no Postgres. As <strong>taxas do produtor</strong> vêm da API ApplyFy: <code>GET https://app.applyfy.com.br/api/v1/gateway/admin/producer/<span id="apiIdPlaceholder">{id}</span></code> — use o ID do produtor na URL.</p>
    <div class="filtro">
      <div class="filtro-row">
        <label for="busca">Filtrar por nome ou email:</label>
        <input type="text" id="busca" placeholder="Digite parte do nome ou email...">
      </div>
      <div class="filtro-row">
        <label for="produtor">Produtor:</label>
        <select id="produtor">
          <option value="">Carregando…</option>
        </select>
      </div>
      <div class="filtro-row">
        <label for="coluna">Coluna a exibir no gráfico:</label>
        <select id="coluna">
          <option value="saldo_disponivel">Saldo disponível</option>
          <option value="saldo_pendente">Saldo pendente</option>
          <option value="saldo_retido">Saldo retido</option>
          <option value="total_sacado">Total sacado</option>
          <option value="vendas_liquidas">Vendas líquidas</option>
          <option value="indicacao">Indicação</option>
          <option value="outros">Outros</option>
        </select>
      </div>
      <p class="empty" id="msgProdutores" style="margin:0;"></p>
    </div>
    <div class="card" id="cardChart" style="display: none;">
      <h2 id="tituloChart">Evolução ao longo do tempo</h2>
      <div class="chart-container"><canvas id="chart"></canvas></div>
    </div>
    <div class="card" id="cardTaxas" style="display: none;">
      <h2>Taxas do produtor (API ApplyFy)</h2>
      <p class="text-muted" style="margin:0 0 0.75rem 0;">API: <code>GET /api/v1/gateway/admin/producer/<span id="apiIdExample">ID</span></code> — o painel chama <code>GET /api/produtor/<span id="apiIdExample2">ID</span>/taxas</code> (com <code>?refresh=1</code> para atualizar da ApplyFy).</p>
      <div class="filtro-row" style="margin-bottom: 0.75rem;">
        <label for="producerId">ID do produtor (obrigatório para buscar na API):</label>
        <input type="text" id="producerId" placeholder="Ex.: oe2kuk5s2i (do webhook PRODUCER_CREATED ou painel ApplyFy)">
        <button type="button" id="btnBuscarTaxas" class="btn">Buscar taxas na API</button>
      </div>
      <p id="taxasMsg" class="empty" style="margin: 0; padding: 1rem 0;"></p>
      <pre id="taxasJson" style="display: none; background: var(--bg); padding: 1rem; border-radius: var(--radius); overflow: auto; font-size: 0.85rem; max-height: 280px;"></pre>
      <p id="taxasFetchedAt" style="font-size: 0.85rem; color: var(--text-muted); margin: 0.5rem 0 0 0;"></p>
    </div>
    <div class="empty" id="empty" style="padding:2rem;text-align:center;color:#71717a;">Selecione um produtor para ver a evolução gráfica.</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    document.body.classList.add('loaded');
    var chartInstance = null;
    var listaProdutores = [];
    var dadosEvolucaoAtuais = [];
    var colunaLabels = { saldo_pendente: 'Saldo pendente', saldo_retido: 'Saldo retido', saldo_disponivel: 'Saldo disponível', total_sacado: 'Total sacado', vendas_liquidas: 'Vendas líquidas', indicacao: 'Indicação', outros: 'Outros' };
    function atualizarChart() {
      var dados = dadosEvolucaoAtuais;
      if (!dados.length) return;
      var colKey = document.getElementById('coluna').value || 'saldo_disponivel';
      var labels = dados.map(function(d) { return d.run_at ? d.run_at.slice(0, 10) : ''; });
      var oneDataset = {
        label: colunaLabels[colKey] || colKey,
        data: dados.map(function(x) { return x[colKey] != null ? Number(x[colKey]) : 0; }),
        borderColor: '#c9a227',
        backgroundColor: 'rgba(201, 162, 39, 0.15)',
        fill: true,
        tension: 0.2
      };
      if (chartInstance) chartInstance.destroy();
      var ctx = document.getElementById('chart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels: labels, datasets: [oneDataset] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#71717a' } },
            x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#71717a', maxRotation: 45 } }
          }
        }
      });
    }
    function filtrarProdutores() {
      var busca = (document.getElementById('busca').value || '').toLowerCase();
      var sel = document.getElementById('produtor');
      var opts = sel.querySelectorAll('option[data-nome][data-email]');
      opts.forEach(function(opt) {
        var show = !busca || (opt.getAttribute('data-nome') || '').toLowerCase().indexOf(busca) >= 0 || (opt.getAttribute('data-email') || '').toLowerCase().indexOf(busca) >= 0;
        opt.style.display = show ? '' : 'none';
      });
    }
    fetch('/api/produtores').then(function(r){ return r.json(); }).then(function(lista) {
      listaProdutores = lista || [];
      var sel = document.getElementById('produtor');
      var msgProd = document.getElementById('msgProdutores');
      if (!listaProdutores.length && msgProd) {
        msgProd.textContent = 'Nenhum produtor no histórico. O histórico é salvo no Postgres quando DATABASE_URL está no .env e o job (run_daily.py) já rodou com sucesso.';
      } else if (msgProd) msgProd.textContent = '';
      sel.innerHTML = '<option value="">Selecione um produtor</option>' + (listaProdutores.map(function(p) {
        var nome = (p.nome || p.email || '').replace(/</g, '&lt;').replace(/"/g, '&quot;');
        var email = (p.email || '').replace(/</g, '&lt;').replace(/"/g, '&quot;');
        return '<option value="' + email + '" data-nome="' + nome + '" data-email="' + email + '">' + nome + ' (' + email + ')</option>';
      }).join(''));
      document.getElementById('busca').addEventListener('input', filtrarProdutores);
      document.getElementById('busca').addEventListener('keyup', filtrarProdutores);
      document.getElementById('coluna').addEventListener('change', function() { if (dadosEvolucaoAtuais.length) atualizarChart(); });
      sel.addEventListener('change', function() {
        var email = sel.value;
        if (!email) {
          document.getElementById('cardChart').style.display = 'none';
          document.getElementById('cardTaxas').style.display = 'none';
          document.getElementById('empty').style.display = 'block';
          if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
          return;
        }
        document.getElementById('cardTaxas').style.display = 'block';
        document.getElementById('producerId').value = '';
        carregarTaxasPorEmail(email);
        fetch('/api/evolucao?email=' + encodeURIComponent(email))
          .then(function(r){ return r.json(); })
          .then(function(res) {
            var dados = res.dados || [];
            dadosEvolucaoAtuais = dados;
            document.getElementById('empty').style.display = dados.length ? 'none' : 'block';
            document.getElementById('tituloChart').textContent = 'Evolução: ' + (dados[0] && dados[0].nome ? dados[0].nome : email);
            document.getElementById('cardChart').style.display = dados.length ? 'block' : 'none';
            if (!dados.length) {
              if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
              return;
            }
            atualizarChart();
          })
          .catch(function() {
            document.getElementById('cardChart').style.display = 'none';
            document.getElementById('empty').style.display = 'block';
            document.getElementById('empty').textContent = 'Erro ao carregar evolução.';
          });
      });
    }).catch(function() { document.getElementById('produtor').innerHTML = '<option value="">Erro ao carregar produtores</option>'; });

    function carregarTaxasPorEmail(email) {
      var msg = document.getElementById('taxasMsg');
      var pre = document.getElementById('taxasJson');
      var fetchedAt = document.getElementById('taxasFetchedAt');
      msg.style.display = 'block';
      msg.textContent = 'Carregando cache de taxas…';
      pre.style.display = 'none';
      fetchedAt.textContent = '';
      fetch('/api/produtor/taxas?email=' + encodeURIComponent(email))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) {
            msg.textContent = data.error;
            return;
          }
          if (!data.taxes_snapshot) {
            msg.textContent = data.message || 'Nenhum cache de taxas para este email. Informe o ID do produtor e clique em "Buscar taxas na API" para buscar na ApplyFy.';
            return;
          }
          msg.style.display = 'none';
          pre.style.display = 'block';
          pre.textContent = JSON.stringify(data.taxes_snapshot, null, 2);
          fetchedAt.textContent = data.fetched_at ? 'Atualizado em: ' + data.fetched_at : '';
        })
        .catch(function() {
          msg.textContent = 'Erro ao carregar taxas.';
        });
    }

    function buscarTaxasPorId() {
      var id = (document.getElementById('producerId').value || '').trim();
      if (!id) {
        document.getElementById('taxasMsg').textContent = 'Informe o ID do produtor.';
        document.getElementById('taxasMsg').style.display = 'block';
        return;
      }
      var msg = document.getElementById('taxasMsg');
      var pre = document.getElementById('taxasJson');
      var fetchedAt = document.getElementById('taxasFetchedAt');
      msg.style.display = 'block';
      msg.textContent = 'Buscando na API ApplyFy…';
      pre.style.display = 'none';
      fetchedAt.textContent = '';
      fetch('/api/produtor/' + encodeURIComponent(id) + '/taxas?refresh=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) {
            msg.textContent = data.error;
            return;
          }
          if (!data.taxes_snapshot) {
            msg.textContent = 'Nenhuma taxa retornada pela API.';
            return;
          }
          msg.style.display = 'none';
          pre.style.display = 'block';
          pre.textContent = JSON.stringify(data.taxes_snapshot, null, 2);
          fetchedAt.textContent = data.fetched_at ? 'Atualizado em: ' + data.fetched_at : '';
        })
        .catch(function() {
          msg.textContent = 'Erro ao buscar taxas na API.';
        });
    }

    document.getElementById('btnBuscarTaxas').addEventListener('click', buscarTaxasPorId);

    document.getElementById('producerId').addEventListener('input', function() {
      var id = (this.value || 'ID').trim() || 'ID';
      var el1 = document.getElementById('apiIdExample');
      var el2 = document.getElementById('apiIdExample2');
      if (el1) el1.textContent = id;
      if (el2) el2.textContent = id;
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
  </script>
</body>
</html>
