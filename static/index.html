<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel Saldos | Applyfy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-card: #121214;
      --border: #1e1e22;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #c9a227;
      --accent-hover: #d4af37;
      --success: #22c55e;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }
    .last-run {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #0a0a0b;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #1a1a1d;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .empty {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-muted);
    }
    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Painel de saldos – produtores</h1>
        <p class="last-run" id="lastRun">Carregando…</p>
      </div>
      <div class="actions">
        <a href="/api/exportar?formato=xlsx" class="btn btn-primary" download>Exportar XLSX</a>
        <a href="/api/exportar?formato=csv" class="btn btn-secondary" download>Exportar CSV</a>
      </div>
    </header>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th class="num">Saldo pendente</th>
              <th class="num">Saldo retido</th>
              <th class="num">Saldo disponível</th>
              <th class="num">Total sacado</th>
              <th class="num">Vendas líquidas</th>
              <th class="num">Indicação</th>
              <th class="num">Outros</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="9" class="empty">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    function fmtMoney(v) {
      if (v == null || v === '' || isNaN(Number(v))) return '–';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v));
    }
    function render(data) {
      const tbody = document.getElementById('tbody');
      const lastRun = document.getElementById('lastRun');
      if (!data.resultados || data.resultados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">Nenhum dado disponível. Execute o job diário ou aguarde a próxima atualização (2h).</td></tr>';
        lastRun.textContent = data.run_at ? 'Última atualização: ' + new Date(data.run_at).toLocaleString('pt-BR') : 'Nenhuma exportação ainda.';
        return;
      }
      lastRun.textContent = 'Última atualização: ' + (data.run_at ? new Date(data.run_at).toLocaleString('pt-BR') : '–') + ' · ' + data.total + ' produtores';
      const cols = ['Nome','Email','Saldo pendente','Saldo retido','Saldo disponível','Total sacado','Vendas líquidas','Indicação','Outros'];
      tbody.innerHTML = data.resultados.map(function(row) {
        return '<tr>' + cols.map(function(c) {
          const val = row[c];
          const isNum = c !== 'Nome' && c !== 'Email';
          return '<td class="' + (isNum ? 'num' : '') + '">' + (isNum ? fmtMoney(val) : (val || '–')) + '</td>';
        }).join('') + '</tr>';
      }).join('');
    }
    fetch('/api/ultimo-relatorio')
      .then(function(r) { return r.json(); })
      .then(render)
      .catch(function() {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="9" class="empty">Erro ao carregar dados.</td></tr>';
        document.getElementById('lastRun').textContent = 'Erro ao carregar.';
      });
  </script>
</body>
</html>
