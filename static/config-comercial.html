<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Config. comercial | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/painel-theme.css">
  <style>
    .cc-intro { color: var(--muted, #888); font-size: 0.9rem; max-width: 42rem; margin-bottom: 1.25rem; line-height: 1.5; }
    .cc-toast { margin: 0 0 1rem; padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.875rem; display: none; }
    .cc-toast.ok { display: block; background: rgba(22, 163, 74, 0.15); color: #16a34a; }
    .cc-toast.err { display: block; background: rgba(220, 38, 38, 0.15); color: #dc2626; }
    .cc-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border, #333); }
    .cc-table { width: 100%; min-width: 640px; border-collapse: collapse; font-size: 0.9rem; text-align: left; }
    .cc-table th { padding: 0.65rem 0.75rem; background: rgba(255,255,255,0.04); font-weight: 600; }
    .cc-table td { padding: 0.65rem 0.75rem; border-top: 1px solid var(--border, #333); }
    .cc-table td.muted { color: var(--muted, #888); }
    .cc-actions { margin-top: 1rem; }
    .btn-ghost { padding: 0.4rem 0.9rem; border-radius: 6px; border: 1px solid var(--border, #444); background: transparent; color: inherit; font-size: 0.875rem; cursor: pointer; }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); }
  </style>
</head>
<body data-active="/config-comercial">
  <div class="app-shell" id="app-shell">
    <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menu">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button type="button" class="sidebar-overlay" id="sidebar-overlay" hidden aria-label="Fechar menu"></button>
    <aside class="sidebar" id="painel-sidebar" aria-label="Navegação"></aside>
    <div class="main-column">
      <header class="top-bar">
        <div class="top-bar-inner">
          <h1 class="page-title">Config. comercial</h1>
        </div>
      </header>
      <main class="main-content">
        <div id="ccToast" class="cc-toast" role="status"></div>
        <p id="ccLoading" class="last-run">A carregar…</p>
        <div id="ccMain" hidden>
          <p class="cc-intro" id="ccIntro"></p>
          <div class="cc-table-wrap">
            <table class="cc-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Email</th>
                  <th>Comercial</th>
                  <th>Gerente comercial</th>
                </tr>
              </thead>
              <tbody id="ccTbody"></tbody>
            </table>
          </div>
          <div class="cc-actions">
            <button type="button" class="btn-ghost" id="ccReload">Recarregar</button>
          </div>
          <p class="cc-intro" style="margin-top:1.5rem;">
            Após alterar, o utilizador deve voltar a abrir o Applyfy (ou esperar renovação do cookie JWT) para as permissões actualizarem.
          </p>
        </div>
      </main>
    </div>
  </div>
  <script src="/static/painel-shell.js?v=6" defer></script>
  <script>
    (function () {
      var API = "/api/hub/applyfy-user-commercial-config";
      var toastEl = document.getElementById("ccToast");
      var loadingEl = document.getElementById("ccLoading");
      var mainEl = document.getElementById("ccMain");
      var introEl = document.getElementById("ccIntro");
      var tbody = document.getElementById("ccTbody");

      function toast(msg, ok) {
        if (!toastEl) return;
        toastEl.textContent = msg;
        toastEl.className = "cc-toast " + (ok ? "ok" : "err");
      }

      function saveFlags(userId, patch) {
        return fetch(API, {
          method: "PUT",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(Object.assign({ userId: userId }, patch)),
        }).then(function (r) {
          return r.json().then(function (j) {
            return { ok: r.ok, j: j };
          });
        });
      }

      function render(data) {
        if (!data.configured) {
          loadingEl.textContent = data.message || "Cliente Applyfy não encontrado.";
          return;
        }
        loadingEl.hidden = true;
        mainEl.hidden = false;
        var cn = data.clientName || "Applyfy";
        function esc(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }
        introEl.innerHTML =
          "Utilizadores com permissão ao cliente <strong>" +
          esc(cn) +
          "</strong>. Marque <strong>Comercial</strong> para o nome poder ser escolhido como vendedor. Marque <strong>Gerente</strong> para poder alterar atribuições vendedor → produtor.";
        var users = data.users || [];
        tbody.innerHTML = users
          .map(function (u) {
            var id = String(u.id || "").replace(/"/g, "&quot;");
            return (
              "<tr data-uid=\"" +
              id +
              "\">" +
              "<td>" +
              String(u.name || "").replace(/</g, "&lt;") +
              "</td>" +
              "<td class=\"muted\">" +
              String(u.email || "").replace(/</g, "&lt;") +
              "</td>" +
              "<td><label><input type=\"checkbox\" class=\"cc-cb-com\" " +
              (u.applyfyComercial ? "checked" : "") +
              " /></label></td>" +
              "<td><label><input type=\"checkbox\" class=\"cc-cb-ger\" " +
              (u.applyfyGerenteComercial ? "checked" : "") +
              " /></label></td>" +
              "</tr>"
            );
          })
          .join("");

        tbody.querySelectorAll("tr").forEach(function (tr) {
          var uid = tr.getAttribute("data-uid");
          var cCom = tr.querySelector(".cc-cb-com");
          var cGer = tr.querySelector(".cc-cb-ger");
          if (cCom) {
            cCom.addEventListener("change", function () {
              var checked = cCom.checked;
              saveFlags(uid, { applyfyComercial: checked }).then(function (x) {
                if (x.ok) {
                  toast("Atualizado", true);
                } else {
                  toast((x.j && x.j.error) || "Erro ao guardar", false);
                  cCom.checked = !checked;
                }
              });
            });
          }
          if (cGer) {
            cGer.addEventListener("change", function () {
              var checked = cGer.checked;
              saveFlags(uid, { applyfyGerenteComercial: checked }).then(function (x) {
                if (x.ok) {
                  toast("Atualizado", true);
                } else {
                  toast((x.j && x.j.error) || "Erro ao guardar", false);
                  cGer.checked = !checked;
                }
              });
            });
          }
        });
      }

      function load() {
        loadingEl.hidden = false;
        loadingEl.textContent = "A carregar…";
        mainEl.hidden = true;
        fetch(API, { credentials: "same-origin" })
          .then(function (r) {
            return r.text().then(function (t) {
              var j = null;
              try {
                j = t ? JSON.parse(t) : null;
              } catch (e) {
                j = null;
              }
              return { ok: r.ok, status: r.status, j: j, raw: t };
            });
          })
          .then(function (x) {
            if (!x.ok) {
              var msg =
                (x.j && x.j.error) ||
                (x.status >= 500
                  ? "Erro no servidor (" + x.status + "). Se a resposta não for JSON, confira logs do Hub (pm2 logs north-hub)."
                  : "Erro " + x.status);
              if (!x.j && x.raw) {
                msg += " — " + String(x.raw).slice(0, 280);
              }
              loadingEl.textContent = msg;
              return;
            }
            render(x.j);
          })
          .catch(function (err) {
            loadingEl.textContent =
              "Erro de rede: " + (err && err.message ? err.message : String(err));
          });
      }

      document.getElementById("ccReload").addEventListener("click", load);
      load();
    })();
  </script>
</body>
</html>
