<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="/static/logo/Icone.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="/static/logo/Icone.png?v=2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Log da exportação | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/painel-theme.css?v=gold7">
</head>
<body data-active="/log">
  <div class="app-shell" id="app-shell">
    <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menu">
      <img src="/static/logo/Icone.png?v=2" alt="" class="sidebar-toggle__icon" decoding="async" />
    </button>
    <button type="button" class="sidebar-overlay" id="sidebar-overlay" hidden aria-label="Fechar menu"></button>
    <aside class="sidebar" id="painel-sidebar" aria-label="Navegação"></aside>
    <div class="main-column">
      <header class="top-bar">
        <div class="top-bar-inner">
          <h1 class="page-title">Log da exportação (saldos)</h1>
        </div>
      </header>
      <main class="main-content">
        <p class="text-muted" style="margin:0 0 1rem;line-height:1.5;max-width:40rem;">Veja o registo da exportação de saldos e inicie ou pause o processo a partir deste ecrã.</p>
        <div class="toolbar-log">
          <label><input type="checkbox" id="autoRefresh" checked> Atualizar a cada 3 s</label>
          <button type="button" class="btn btn-primary" id="btnStart">Iniciar processo</button>
          <button type="button" class="btn btn-danger" id="btnStop">Pausar processo</button>
          <button type="button" class="btn btn-secondary" id="btnClear">Limpar log</button>
          <span class="toolbar-msg" id="jobMsg"></span>
        </div>
        <div class="card">
          <div class="log-box" id="logBox" style="max-height:70vh;"></div>
        </div>
        <p class="status" id="status"></p>
      </main>
    </div>
  </div>
  <script src="/static/painel-shell.js?v=28" defer></script>
  <script>
    var autoRefreshId = null;
    function loadLog() {
      fetch('/api/log?lines=500')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var box = document.getElementById('logBox');
          box.textContent = data.log || '(vazio)';
          box.scrollTop = box.scrollHeight;
          document.getElementById('status').textContent = 'Última atualização: ' + new Date().toLocaleTimeString('pt-BR');
        })
        .catch(function() {
          document.getElementById('logBox').textContent = 'Erro ao carregar o log.';
          document.getElementById('status').textContent = '';
        });
    }
    document.getElementById('autoRefresh').addEventListener('change', function() {
      if (this.checked) {
        loadLog();
        autoRefreshId = setInterval(loadLog, 3000);
      } else {
        if (autoRefreshId) clearInterval(autoRefreshId);
      }
    });
    function setJobMsg(msg, isError) {
      var el = document.getElementById('jobMsg');
      el.textContent = msg || '';
      el.style.color = isError ? '#f87171' : '';
    }
    document.getElementById('btnStart').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      setJobMsg('Iniciando…');
      fetch('/api/job/start', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          setJobMsg(data.message || 'Processo iniciado.');
          if (data.ok) loadLog();
        })
        .catch(function(e) { setJobMsg('Erro: ' + (e.message || 'falha na requisição'), true); })
        .finally(function() { btn.disabled = false; });
    });
    document.getElementById('btnStop').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      setJobMsg('Enviando parada…');
      fetch('/api/job/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          setJobMsg(data.message || 'Parada enviada.');
          if (data.ok) loadLog();
        })
        .catch(function(e) { setJobMsg('Erro: ' + (e.message || 'falha na requisição'), true); })
        .finally(function() { btn.disabled = false; });
    });
    document.getElementById('btnClear').addEventListener('click', function() {
      var btn = this;
      if (!confirm('Limpar todo o conteúdo do log? Isso não pode ser desfeito.')) return;
      btn.disabled = true;
      setJobMsg('Limpando…');
      fetch('/api/log/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          setJobMsg(data.message || 'Log limpo.');
          if (data.ok) loadLog();
        })
        .catch(function(e) { setJobMsg('Erro: ' + (e.message || 'falha na requisição'), true); })
        .finally(function() { btn.disabled = false; });
    });
    loadLog();
    autoRefreshId = setInterval(loadLog, 3000);
  </script>
</body>
</html>
