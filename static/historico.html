<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Histórico por data | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/painel-theme.css">
</head>
<body data-active="/historico">
  <div class="app-shell" id="app-shell">
    <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menu">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button type="button" class="sidebar-overlay" id="sidebar-overlay" hidden aria-label="Fechar menu"></button>
    <aside class="sidebar" id="painel-sidebar" aria-label="Navegação"></aside>
    <div class="main-column">
      <header class="top-bar">
        <div class="top-bar-inner">
          <h1 class="page-title">Histórico de saldos por data</h1>
        </div>
      </header>
      <main class="main-content">
        <div class="filtro">
          <label for="data">Data do relatório:</label>
          <select id="data">
            <option value="">Carregando…</option>
          </select>
          <a href="#" id="btnExportarXlsx" class="btn btn-primary disabled" download>Exportar XLSX</a>
        </div>
        <p class="empty" id="msgHistorico" style="margin-bottom:1rem;"></p>
        <div class="card">
          <div class="table-wrap flat">
            <table>
              <thead>
                <tr>
                  <th data-col="Nome" data-type="text">Nome <span class="sort-icon">↕</span></th>
                  <th data-col="Email" data-type="text">Email <span class="sort-icon">↕</span></th>
                  <th data-col="Saldo pendente" data-type="num" class="num">Saldo pendente <span class="sort-icon">↕</span></th>
                  <th data-col="Saldo retido" data-type="num" class="num">Saldo retido <span class="sort-icon">↕</span></th>
                  <th data-col="Saldo disponível" data-type="num" class="num">Saldo disponível <span class="sort-icon">↕</span></th>
                  <th data-col="Total sacado" data-type="num" class="num">Total sacado <span class="sort-icon">↕</span></th>
                  <th data-col="Vendas líquidas" data-type="num" class="num">Vendas líquidas <span class="sort-icon">↕</span></th>
                  <th data-col="Indicação" data-type="num" class="num">Indicação <span class="sort-icon">↕</span></th>
                  <th data-col="Outros" data-type="num" class="num">Outros <span class="sort-icon">↕</span></th>
                </tr>
              </thead>
              <tbody id="tbody"><tr><td colspan="9" class="empty">Selecione uma data.</td></tr></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="/painel-shell.js" defer></script>
  <script>
    var cols = ['Nome','Email','Saldo pendente','Saldo retido','Saldo disponível','Total sacado','Vendas líquidas','Indicação','Outros'];
    var dadosAtuais = [];
    var sortCol = null, sortAsc = true;
    function fmtMoney(v) {
      if (v == null || v === '' || isNaN(Number(v))) return '–';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v));
    }
    function rowToHtml(row) {
      return '<tr>' + cols.map(function(c) {
        var val = row[c];
        var isNum = c !== 'Nome' && c !== 'Email';
        return '<td class="' + (isNum ? 'num' : '') + '">' + (isNum ? fmtMoney(val) : (val || '–')) + '</td>';
      }).join('') + '</tr>';
    }
    function renderTable(rows) {
      var tbody = document.getElementById('tbody');
      tbody.innerHTML = rows.length ? rows.map(rowToHtml).join('') : '<tr><td colspan="9" class="empty">Nenhum dado para esta data.</td></tr>';
    }
    function sortData(col, type) {
      if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
      var mult = sortAsc ? 1 : -1;
      var sorted = dadosAtuais.slice().sort(function(a, b) {
        var va = a[col], vb = b[col];
        if (type === 'num') { va = Number(va) || 0; vb = Number(vb) || 0; return mult * (va - vb); }
        va = (va || '').toString().toLowerCase();
        vb = (vb || '').toString().toLowerCase();
        return mult * va.localeCompare(vb);
      });
      document.querySelectorAll('th').forEach(function(th){
        th.classList.toggle('sorted', th.getAttribute('data-col') === col);
        var icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = th.getAttribute('data-col') === col ? (sortAsc ? '↑' : '↓') : '↕';
      });
      renderTable(sorted);
    }
    document.querySelector('thead').addEventListener('click', function(e) {
      var th = e.target.closest('th[data-col]');
      if (th) sortData(th.getAttribute('data-col'), th.getAttribute('data-type') || 'text');
    });
    fetch('/api/datas').then(function(r){ return r.json(); }).then(function(datas) {
      var sel = document.getElementById('data');
      var msg = document.getElementById('msgHistorico');
      if (!datas || datas.length === 0) {
        sel.innerHTML = '<option value="">Nenhuma data</option>';
        if (msg) msg.textContent = 'O histórico vem do Postgres (DATABASE_URL no .env). Confira o .env e execute o job pelo menos uma vez. Se o job já rodou com sucesso, reinicie o painel: sudo systemctl restart applyfy-painel';
      } else {
        if (msg) msg.textContent = '';
        sel.innerHTML = '<option value="">Selecione uma data</option>' + (datas.map(function(d) {
          return '<option value="' + d.run_at + '">' + d.label + '</option>';
        }).join(''));
      }
      sel.addEventListener('change', function() {
        var runAt = sel.value;
        var btnXlsx = document.getElementById('btnExportarXlsx');
        if (!runAt) { dadosAtuais = []; renderTable([]); btnXlsx.classList.add('disabled'); btnXlsx.href = '#'; return; }
        btnXlsx.classList.remove('disabled');
        btnXlsx.href = '/api/exportar?formato=xlsx&run_at=' + encodeURIComponent(runAt);
        fetch('/api/relatorio?run_at=' + encodeURIComponent(runAt))
          .then(function(r){ return r.json(); })
          .then(function(data) {
            dadosAtuais = data.resultados || [];
            sortCol = null; sortAsc = true;
            renderTable(dadosAtuais);
          })
          .catch(function() { renderTable([]); });
      });
    }).catch(function() { document.getElementById('data').innerHTML = '<option value="">Erro ao carregar datas</option>'; });
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
  </script>
</body>
</html>
