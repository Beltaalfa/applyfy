<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Saldo | Applyfy</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/painel-theme.css">
  <style>
    .saldo-lead { color: var(--zinc-400); font-size: 0.92rem; max-width: 44rem; margin: 0 0 1rem; line-height: 1.5; }
    .table-wrap.flat .num { text-align: right; font-variant-numeric: tabular-nums; }
    .gw-wrap { overflow-x: auto; }
  </style>
</head>
<body data-active="/saldo">
  <div class="app-shell" id="app-shell">
    <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menu">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button type="button" class="sidebar-overlay" id="sidebar-overlay" hidden aria-label="Fechar menu"></button>
    <aside class="sidebar" id="painel-sidebar" aria-label="Navegação"></aside>
    <div class="main-column">
      <header class="top-bar">
        <div class="top-bar-inner">
          <h1 class="page-title">Saldo</h1>
        </div>
      </header>
      <main class="main-content">
        <p class="saldo-lead">Saldos por produtor via API (<code>balances</code> e <code>totals</code> em <code>GET /gateway/admin/producers</code>). Filtro <code>nameOrEmail</code>. Os valores são os devolvidos pela Applyfy no momento da consulta.</p>
        <div class="filtro">
          <label for="saldoBusca">Nome ou e-mail</label>
          <input type="search" id="saldoBusca" placeholder="Filtrar…" autocomplete="off" style="min-width:14rem;">
          <label for="saldoPageSize">Por página</label>
          <select id="saldoPageSize">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
          </select>
          <button type="button" class="btn btn-primary" id="btnSaldoConsultar">Consultar</button>
          <button type="button" class="btn btn-secondary" id="btnSaldoPrev">Anterior</button>
          <button type="button" class="btn btn-secondary" id="btnSaldoNext">Seguinte</button>
        </div>
        <p id="msgSaldo" class="text-muted" style="margin:0.35rem 0 0.75rem;">A carregar…</p>
        <div class="card gw-wrap">
          <div class="table-wrap flat">
            <table>
              <thead>
                <tr>
                  <th>Produtor</th>
                  <th>E-mail</th>
                  <th class="num">Pendente</th>
                  <th class="num">Retido</th>
                  <th class="num">Disponível</th>
                  <th class="num">Total sacado</th>
                  <th class="num">Total vendas (API)</th>
                  <th class="num">Chargeback (API)</th>
                </tr>
              </thead>
              <tbody id="saldoTbody">
                <tr><td colspan="8" class="empty">A carregar…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="/static/painel-shell.js?v=11" defer></script>
  <script>
    function gwEsc(s) {
      if (s == null || s === '') return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
    }
    function fmtBRL(n) {
      if (n == null || n === '') return '–';
      var x = Number(n);
      if (isNaN(x)) return gwEsc(n);
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(x);
    }
    var saldoPage = 1;
    var saldoLastPag = {};

    function buildSaldoQuery() {
      var params = new URLSearchParams();
      params.set('page', String(saldoPage));
      params.set('pageSize', String(parseInt(document.getElementById('saldoPageSize').value, 10) || 20));
      var q = document.getElementById('saldoBusca').value.trim();
      if (q) params.set('nameOrEmail', q);
      return params;
    }

    function gatewayProducersUrl() {
      var u = new URL('/api/gateway/producers', window.location.origin);
      buildSaldoQuery().forEach(function (value, key) {
        u.searchParams.set(key, value);
      });
      return u.toString();
    }

    function formatErr(status, bodyText) {
      var t = (bodyText || '').trim();
      if (/^<!doctype/i.test(t) || /^<html/i.test(t)) {
        return status === 404
          ? 'HTTP 404 — confirme deploy e rota /api/gateway/producers.'
          : 'Resposta HTML (HTTP ' + status + ').';
      }
      var j = null;
      try { j = t ? JSON.parse(t) : null; } catch (e) { j = null; }
      if (j && j.error && j.error.message) return String(j.error.message);
      return t.slice(0, 300) || ('HTTP ' + status);
    }

    function setNavButtons() {
      var tp = saldoLastPag.totalPages != null ? Number(saldoLastPag.totalPages) : null;
      document.getElementById('btnSaldoPrev').disabled = saldoPage <= 1;
      document.getElementById('btnSaldoNext').disabled = tp != null && tp > 0 && saldoPage >= tp;
    }

    function loadSaldo() {
      var msg = document.getElementById('msgSaldo');
      var tbody = document.getElementById('saldoTbody');
      msg.textContent = 'A carregar…';
      var url = gatewayProducersUrl();
      fetch(url, { credentials: 'same-origin' })
        .then(function (r) { return r.text().then(function (t) { return { ok: r.ok, status: r.status, t: t }; }); })
        .then(function (o) {
          var data = null;
          try { data = o.t ? JSON.parse(o.t) : null; } catch (e) { data = null; }
          if (!o.ok) {
            msg.textContent = 'Erro: ' + formatErr(o.status, o.t);
            tbody.innerHTML = '<tr><td colspan="8" class="empty">' + gwEsc(formatErr(o.status, o.t).slice(0, 200)) + '</td></tr>';
            setNavButtons();
            return;
          }
          if (!data || data.success === false) {
            msg.textContent = 'Resposta inválida.';
            tbody.innerHTML = '<tr><td colspan="8" class="empty">Resposta inválida.</td></tr>';
            setNavButtons();
            return;
          }
          var d = data.data || {};
          var pag = d.pagination || {};
          saldoLastPag = pag;
          var items = d.items || [];
          msg.textContent =
            'Página ' + (pag.page != null ? pag.page : saldoPage) + ' / ' + (pag.totalPages != null ? pag.totalPages : '?') +
            ' — ' + (pag.count != null ? pag.count : '?') + ' produtor(es).';
          if (!items.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty">Nenhum resultado. Ajuste o filtro.</td></tr>';
            setNavButtons();
            return;
          }
          tbody.innerHTML = items.map(function (p) {
            var nome = gwEsc(p.displayName || p.name || '–');
            var em = gwEsc(p.email || '–');
            var b = p.balances || {};
            var t = p.totals || {};
            return '<tr>' +
              '<td>' + nome + '</td>' +
              '<td><code style="font-size:0.85em;">' + em + '</code></td>' +
              '<td class="num">' + fmtBRL(b.pending) + '</td>' +
              '<td class="num">' + fmtBRL(b.fundLock) + '</td>' +
              '<td class="num">' + fmtBRL(b.available) + '</td>' +
              '<td class="num">' + fmtBRL(t.withdrawn) + '</td>' +
              '<td class="num">' + fmtBRL(t.sold) + '</td>' +
              '<td class="num">' + fmtBRL(t.chargeback) + '</td>' +
              '</tr>';
          }).join('');
          setNavButtons();
        })
        .catch(function (e) {
          msg.textContent = 'Erro: ' + (e.message || '');
          setNavButtons();
        });
    }

    document.getElementById('btnSaldoConsultar').addEventListener('click', function () { saldoPage = 1; loadSaldo(); });
    document.getElementById('btnSaldoPrev').addEventListener('click', function () { if (saldoPage > 1) { saldoPage--; loadSaldo(); } });
    document.getElementById('btnSaldoNext').addEventListener('click', function () {
      var tp = saldoLastPag.totalPages != null ? Number(saldoLastPag.totalPages) : null;
      if (tp != null && saldoPage >= tp) return;
      saldoPage++;
      loadSaldo();
    });
    document.getElementById('saldoBusca').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); saldoPage = 1; loadSaldo(); }
    });

    loadSaldo();
  </script>
</body>
</html>
