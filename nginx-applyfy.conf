# Nginx: applyfy.northempresarial.com -> painel Applyfy (porta 5000)
# Ativar: sudo ln -sf /etc/nginx/sites-available/applyfy /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx
#
# Ajuste ssl_certificate* para a pasta real em: ls /etc/letsencrypt/live/

server {
    listen 80;
    listen [::]:80;
    server_name applyfy.northempresarial.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name applyfy.northempresarial.com;

    ssl_certificate     /etc/letsencrypt/live/applyfy.northempresarial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/applyfy.northempresarial.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
