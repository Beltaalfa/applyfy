# Nginx: applyfy.northempresarial.com -> painel Applyfy (porta 5000)
# Certificado geral: northempresarial.com (ajuste os caminhos se o seu for diferente)
# Ativar: sudo ln -sf /etc/nginx/sites-available/applyfy /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

# HTTP -> redireciona para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name applyfy.northempresarial.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS -> painel Applyfy
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name applyfy.northempresarial.com;

    # Certificado geral northempresarial.com (wildcard ou principal)
    ssl_certificate     /etc/letsencrypt/live/northempresarial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/northempresarial.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
