# applyfy.northempresarial.com → Gunicorn Flask (127.0.0.1:5000)
#
# Problema sem este ficheiro: pedidos HTTPS a applyfy.* caem noutro vhost (ex.: Construneves)
# porque não há server_name applyfy — o browser mostra o URL applyfy mas o conteúdo é outro.
#
# Ativar:
#   sudo cp /var/www/applyfy/deploy/nginx-applyfy.northempresarial.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/nginx-applyfy.northempresarial.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (recomendado):
#   sudo certbot --nginx -d applyfy.northempresarial.com

server {
    listen 80;
    listen [::]:80;
    server_name applyfy.northempresarial.com;

    client_max_body_size 32m;

    location = /api/internal/sync-transactions {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
